global:
  scrape_interval: 15s
  evaluation_interval: 15s

# You can add Alertmanager here later if you want
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

rule_files:
  # empty for now, no rules needed yet
  # - "rules/*.rules"

scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Example: if you later run node_exporter or cadvisor
  # - job_name: node
  #   static_configs:
  #     - targets: ["host.docker.internal:9100"]

  # If you have /metrics in backend (for example, FastAPI + prometheus-client)
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
    # If metrics live somewhere other than the root, for example /metrics:
    # metrics_path: /metrics
    # additional options can be added later