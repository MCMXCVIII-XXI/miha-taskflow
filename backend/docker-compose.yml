services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    command: >
      postgres -c max_connections=200
            -c shared_buffers=256MB
            -c effective_cache_size=384MB
            -c maintenance_work_mem=64MB
            -c checkpoint_completion_target=0.7
            -c wal_buffers=16MB
            -c default_statistics_target=100
            -c work_mem=4MB
            -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true
    networks:
      - database

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${CACHE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_BACKEND_URL}
    healthcheck:                                  
      test: ["CMD", "curl", "-f", "http://backend:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - background
      - search
      - cache
      - monitoring
      - database


  cache:
    image: redis:8.4.2-alpine
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "${REDIS_USER}",
          "--pass",
          "${REDIS_USER_PASSWORD}",
          "ping",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true
    networks:
      - cache
      - background

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    environment:
      - node.name=es01
      - discovery.type=single-node
      - cluster.name=taskflow-es
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      - cache
    networks:
      - search

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.background.celery worker -l INFO --pool=prefork --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${CACHE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_BACKEND_URL}
    restart: unless-stopped
    networks:
      - background

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.beat
    command: celery -A app.background.celery beat -l INFO
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${CACHE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_BACKEND_URL}
    restart: unless-stopped
    networks:
      - background

  flower:
    build:
      context: .
      dockerfile: Dockerfile.flower
    command: >
      celery -A app.background.celery flower
      --broker=${CELERY_BROKER_URL}
      --port=5555
      --basic_auth=admin:flowerpass123
    ports:
      - "5555:5555"
    depends_on:
      cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - background

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./alloy.hcl:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
    networks:
      - monitoring
    depends_on:
      - loki
    restart: unless-stopped
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    volumes:
      - media_data:/var/www/media
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - background
      - search
      - cache
      - monitoring
      - database


networks:
  search:
    driver: bridge
  monitoring:
    driver: bridge
  cache:
    driver: bridge
  background:
    driver: bridge
  database:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data:
  grafana_data:
  media_data:
