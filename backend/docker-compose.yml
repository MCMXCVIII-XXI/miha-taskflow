services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/taskflow
      REDIS_URL: redis://cache:6379/0
    volumes:
      - .:/app 
      - /app/node_modules  
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A celery_app.celery worker --loglevel=info -Q celery
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/taskflow
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/0
    volumes:
      - .:/app
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A celery_app.celery beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/taskflow
      REDIS_URL: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/0
      CELERY_RESULT_BACKEND: redis://cache:6379/0
    volumes:
      - .:/app
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434" 
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    command: sh -c "ollama serve & sleep 5 && ollama pull llama3.2:1b && wait"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
