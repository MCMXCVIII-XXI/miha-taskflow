services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    command: >
      postgres -c max_connections=200
            -c shared_buffers=256MB
            -c effective_cache_size=384MB
            -c maintenance_work_mem=64MB
            -c checkpoint_completion_target=0.7
            -c wal_buffers=16MB
            -c default_statistics_target=100
            -c work_mem=4MB
            -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${CACHE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_BACKEND_URL}
    restart: unless-stopped

  cache:
    image: redis:8.4.2-alpine
    env_file:
      - .env_cache
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "${REDIS_USER}",
          "--pass",
          "${REDIS_USER_PASSWORD}",
          "ping",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    environment:
      - node.name=es01
      - discovery.type=single-node
      - cluster.name=taskflow-es
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      - cache

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.background.celery worker -l INFO --pool=prefork --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${CACHE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_BACKEND_URL}
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.beat
    command: celery -A app.background.celery beat -l INFO
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DB_URL}
      REDIS_URL: ${CACHE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_BACKEND_URL}
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile.flower
    command: >
      celery -A app.background.celery flower
      --broker=${CELERY_BROKER_URL}
      --port=5555
      --basic_auth=admin:flowerpass123
    ports:
      - "5555:5555"
    depends_on:
      cache:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  es_data:
