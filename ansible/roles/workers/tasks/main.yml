- name: Create worker compose file
  ansible.builtin.template:
    src: docker-compose.worker.yml.j2
    dest: "{{ compose_project_dir }}/docker-compose-worker.yml"
    mode: "0644"

- name: Pull worker image
  ansible.builtin.command:
    cmd: docker compose -f docker-compose-worker.yml pull
    chdir: "{{ compose_project_dir }}"
  changed_when: true

- name: Start worker stack
  ansible.builtin.command:
    cmd: docker compose -f docker-compose-worker.yml up -d --remove-orphans
    chdir: "{{ compose_project_dir }}"
  changed_when: true
