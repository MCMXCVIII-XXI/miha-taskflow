name: Taskflow-Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TOKEN_SECRET_KEY: ${{ secrets.TOKEN_SECRET_KEY }}
      DB_URL: sqlite+aiosqlite:///test.db
      CACHE_URL: memory://
    steps:
      - name: Debug
        run: |
          echo "DB_URL=$DB_URL"
          echo "CACHE_URL=$CACHE_URL"
          echo "TOKEN_SECRET_KEY=$TOKEN_SECRET_KEY"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: 3.11

      - name: Tests
        run: cd backend/ && make test-coverage
