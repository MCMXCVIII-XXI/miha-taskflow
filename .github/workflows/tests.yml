name: Taskflow-Tests

on:
  workflow_call:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    if: "!needs.test.result == 'cancelled'"
    defaults:
      run:
        working-directory: backend
    env:
      TOKEN_SECRET_KEY: ${{ secrets.TOKEN_SECRET_KEY }}
      DB_URL: sqlite+aiosqlite:///test.db
      CACHE_URL: memory://
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: 3.11

      - name: Tests
        run: make test-pg-coverage
